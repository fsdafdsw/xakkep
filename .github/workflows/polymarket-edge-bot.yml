name: polymarket-edge-bot

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      upload_artifacts:
        description: "Upload JSON reports as GitHub artifact"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: polymarket-edge-bot-paper
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: polymarket_edge_bot_realprice
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          ODDS_REGIONS: ${{ vars.ODDS_REGIONS }}
          ODDS_BOOKMAKERS: ${{ vars.ODDS_BOOKMAKERS }}
          BOT_BUILD_ID: ${{ github.sha }}
          BOT_SOURCE: ${{ github.repository }}/${{ github.ref_name }}/run-${{ github.run_id }}
          PAPER_TRADING_ENABLED: "true"
          PAPER_INITIAL_BANKROLL_USD: "30"
          PAPER_MAX_BET_USD: "1.5"
          PAPER_MIN_TRADE_USD: "0.35"
          PAPER_MAX_OPEN_POSITIONS: "2"
          PAPER_REENTRY_COOLDOWN_MINUTES: "15"
          PAPER_THESIS_REENTRY_COOLDOWN_MINUTES: "240"
          PAPER_DAILY_STOP_LOSS_USD: "1.5"
          PAPER_CORE_LANES: "release_hearing,diplomacy_talk_call,diplomacy_meeting"
          PAPER_SCOUT_ENABLED: "false"
          PAPER_SCOUT_STAKE_USD: "0.30"
          PAPER_SCOUT_MAX_PER_RUN: "2"
          PAPER_SCOUT_LANES: "conflict_fast,release_hearing,diplomacy_talk_call"
          PAPER_SCOUT_MIN_WATCH_SCORE: "0.72"
          PAPER_SCOUT_MIN_ATTENTION_GAP: "0.38"
          PAPER_SCOUT_MIN_CONFIDENCE: "0.72"
          PAPER_SCOUT_MIN_LANE_PRIOR: "0.62"
          PAPER_SCOUT_MAX_ENTRY_PRICE: "0.22"
          PAPER_RADAR_SCOUT_MIN_SCORE: "0.78"
          PAPER_RADAR_SCOUT_MIN_CONFIDENCE: "0.74"
          PAPER_RADAR_SCOUT_MIN_ATTENTION_GAP: "0.38"
          PAPER_RADAR_SCOUT_MAX_ENTRY_PRICE: "0.18"
        run: python main.py

      - name: Commit paper state
        if: ${{ always() }}
        run: |
          cd ..
          if ! git status --short -- polymarket_edge_bot_realprice/paper_state | grep . >/dev/null; then
            echo "No paper state changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add polymarket_edge_bot_realprice/paper_state
          git commit -m "Update paper trading state [skip ci]" || exit 0
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Upload reports artifact
        if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.upload_artifacts }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: polymarket-edge-bot-report-${{ github.run_id }}
          path: polymarket_edge_bot_realprice/reports
          if-no-files-found: ignore
          retention-days: 1
