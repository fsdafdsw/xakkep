name: polymarket-edge-bot

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      upload_artifacts:
        description: "Upload JSON reports as GitHub artifact"
        required: false
        default: false
        type: boolean

jobs:
  run:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: polymarket_edge_bot_realprice
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BOT_BUILD_ID: ${{ github.sha }}
          BOT_SOURCE: ${{ github.repository }}/${{ github.ref_name }}/run-${{ github.run_id }}
        run: python main.py

      - name: Upload reports artifact
        if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.upload_artifacts }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: polymarket-edge-bot-report-${{ github.run_id }}
          path: polymarket_edge_bot_realprice/reports
          if-no-files-found: ignore
          retention-days: 1
