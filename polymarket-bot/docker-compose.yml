services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    restart: unless-stopped

  market_ingestor:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env
    command: python -m bot.services.market_ingestor.main
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  backtest_replay:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env
    command: python -m bot.services.backtest_replay.main
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  feature_service:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env
    command: python -m bot.services.feature_service.main
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  forecast_service:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env
    command: python -m bot.services.forecast_service.main
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  edge_engine:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env
    command: python -m bot.services.edge_engine.main
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  risk_engine:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env
    command: python -m bot.services.risk_engine.main
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  execution_engine:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env
    command: python -m bot.services.execution_engine.main
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  ops_api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env
    command: python -m bot.services.ops_api.main
    ports:
      - "8080:8080"
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  pg_data:
